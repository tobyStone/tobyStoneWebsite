<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ship</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Main Site</a>
    
    <div id="ship-container">
        <!-- 
            We use contain: strict to ensure the browser completely sandboxes this element.
            This gives massive performance benefits for video transitions inside it.
        -->
        <!-- 1) Lowest Z: Background -->
        <video id="bg-clouds" class="bg-vid" src="/videos/Clouds_moving_across_202604191247.mp4" muted loop autoplay playsinline></video>
        
        <!-- 2) Mid Z: Ship Motion (User-Controlled) -->
        <video id="ship-l" class="ship-vid" data-src="/videos/ship_sails_left.mp4" muted preload="auto" playsinline></video>
        <video id="ship-r" class="ship-vid" data-src="/videos/ship_sails_right.mp4" src="/videos/ship_sails_right.mp4" muted preload="auto" playsinline></video>
        <video id="ship-tl" class="ship-vid" data-src="/videos/ship_turning_left.mp4" muted preload="auto" playsinline></video>
        <video id="ship-tr" class="ship-vid" data-src="/videos/ship_turning_right.mp4" muted preload="auto" playsinline></video>
        
        <!-- 3) Highest Z: Sea Foreground (Transparent) -->
        <video id="waves-l" class="waves-vid" data-src="/videos/wavesGoingLeft.mp4" muted preload="auto" playsinline></video>
        <video id="waves-r" class="waves-vid" data-src="/videos/wavesGoingRight.mp4" src="/videos/wavesGoingRight.mp4" muted preload="auto" playsinline></video>
    </div>

    <!-- UI Overlay for debugging (optional) -->
    <div id="debug-overlay" class="hidden">
        <div>State: <span id="dbg-state"></span></div>
        <div>Direction: <span id="dbg-dir"></span></div>
        <div>Ship X: <span id="dbg-x"></span></div>
        <div>Mouse X: <span id="dbg-mx"></span></div>
    </div>

    <script type="module" src="./js/ShipEngine.js"></script>
</body>
</html>
