<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ship</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Main Site</a>
    
    <div id="ship-container" class="ghost-game-scene">
        <!-- 1) Lowest Z: Background -->
        <video id="bg-clouds" class="background-video" src="/videos/clouds-moon-background-web.mp4" muted loop autoplay playsinline preload="auto"></video>
        
        <!-- 2) Mid Z: Ship Motion (4 preloaded states) -->
        <video id="ship-idle" class="ship-overlay active" src="/videos/ship_idle_v2.webm" muted loop autoplay playsinline preload="auto"></video>
        <video id="ship-sailing" class="ship-overlay" src="/videos/ship_sailing_v5.webm" muted loop playsinline preload="auto"></video>
        <video id="ship-hit" class="ship-overlay" src="/videos/ship_hit.webm" muted playsinline preload="auto"></video>
        <video id="ship-sink" class="ship-overlay" src="/videos/ship_sink_v3_stunning.webm" muted playsinline preload="auto"></video>

        <!-- 3) Highest Z: Sea Foreground (Transparent) -->
        <video id="sea-overlay" class="sea-overlay" src="/videos/dark-sea-transparent.webm" muted loop autoplay playsinline preload="auto"></video>
        
        <!-- 4) Game UI (Interactive testing buttons) -->
        <div class="game-ui">
            <button type="button" id="btn-idle">Idle</button>
            <button type="button" id="btn-sail">Sail</button>
            <button type="button" id="btn-hit">Hit</button>
            <button type="button" id="btn-sink">Sink</button>
            <button type="button" id="btn-turn">Turn</button>
        </div>
    </div>

    <script type="module" src="./js/ShipEngine.js"></script>
</body>
</html>
