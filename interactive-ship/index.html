<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ship</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Main Site</a>
    
    <div id="ship-container">
        <!-- 
            We use contain: strict to ensure the browser completely sandboxes this element.
            This gives massive performance benefits for video transitions inside it.
        -->
        <img id="bg-shipless-base" src="/images/starryBackgroundBase.png" alt="Base Background" class="bg-layer" />
        <img id="bg-shipless" src="/images/blackPirateShiplessBackground.png" alt="Background" class="bg-layer" />
        
        <video id="video-l" src="/videos/Black_and_white_202604151320.mp4" muted preload="auto" playsinline loop></video>
        <video id="video-r" src="/videos/Visual__Black_and_202604151319.mp4" muted preload="auto" playsinline loop></video>
        <video id="video-t" src="/videos/Image_turning_on_202604151318.mp4" muted preload="auto" playsinline></video>
    </div>

    <!-- UI Overlay for debugging (optional) -->
    <div id="debug-overlay" class="hidden">
        <div>State: <span id="dbg-state"></span></div>
        <div>Direction: <span id="dbg-dir"></span></div>
        <div>Ship X: <span id="dbg-x"></span></div>
        <div>Mouse X: <span id="dbg-mx"></span></div>
    </div>

    <script type="module" src="./js/ShipEngine.js"></script>
</body>
</html>
